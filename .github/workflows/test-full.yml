name: Test (full build)

on:
  schedule:
    - cron: '0 0 * * 0'  # every Sunday at 00:00 UTC
  workflow_dispatch:

jobs:
  test-full:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install build dependencies
        run: sudo apt-get install -y python3 make g++
      - name: Build Node.js and run setup
        run: npm run setup
      - run: npm test
